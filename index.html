<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calculator">
    <div class="row">
        <input type="text" id="num1" placeholder="123">

        <select id="operation">
            <option value="+">+</option>
            <option value="-">−</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <input type="text" id="num2" placeholder="567">
    </div>

    <button id="calculateBtn">подсчитать</button>

    <div class="error-message" id="errorMessage"></div>

    <div class="results" id="results"></div>
</div>

<script src="script.js"></script>
</body>
</html>
